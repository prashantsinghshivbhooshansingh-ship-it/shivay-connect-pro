<!DOCTYPE html>
<html>
<head>
  <title>Shivay Message Box</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🔥 Shivay Message Box</h2>

<div id="login">
  <button onclick="login()">Login with Gmail</button>
</div>

<div id="chat" style="display:none;">

  <input id="email" placeholder="Enter user Gmail">
  <button onclick="startChat(document.getElementById('email').value)">Start Chat</button>

  <div class="chat-box" id="messages"></div>

  <div class="input-box">
    <input id="msg" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

  <input type="file" id="file">
  <button onclick="sendImage()">Send Image</button>

  <hr>

  <button onclick="generateCode()">Generate Share Code</button>
  <p id="code"></p>

  <hr>

  <input id="statusInput" placeholder="Update status">
  <button onclick="updateStatus()">Post Status</button>
  <div id="statusList"></div>

  <hr>

  <button onclick="startVideo()">🎥 Video Call</button>

  <video id="localVideo" autoplay muted></video>
  <video id="remoteVideo" autoplay></video>

</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
